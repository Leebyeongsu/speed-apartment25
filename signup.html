<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>대리점 가입 신청 — Speed Apartment</title>
    <link rel="stylesheet" href="landing.css">
    <style>
        .auth-wrap {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 24px;
            background: linear-gradient(135deg, #f5f7fa 0%, #e8ecf3 100%);
        }
        .auth-card {
            width: 100%;
            max-width: 460px;
            background: #fff;
            border-radius: 16px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.08);
            padding: 36px 32px;
        }
        .auth-logo {
            text-align: center;
            font-size: 22px;
            font-weight: 700;
            color: #1a1a2e;
            margin-bottom: 8px;
        }
        .auth-logo span { color: #7B1FA2; }
        .auth-sub {
            text-align: center;
            color: #666;
            font-size: 13px;
            margin-bottom: 24px;
        }
        .auth-field { margin-bottom: 14px; }
        .auth-field label {
            display: block;
            font-size: 13px;
            font-weight: 600;
            color: #444;
            margin-bottom: 6px;
        }
        .auth-field input {
            width: 100%;
            padding: 11px 14px;
            font-size: 15px;
            border: 1px solid #d8d8e0;
            border-radius: 10px;
            background: #fafafe;
            box-sizing: border-box;
        }
        .auth-field input:focus {
            outline: none;
            border-color: #7B1FA2;
            background: #fff;
        }
        .auth-field .hint {
            font-size: 11px;
            color: #999;
            margin-top: 4px;
        }
        .auth-btn {
            width: 100%;
            padding: 13px;
            font-size: 15px;
            font-weight: 600;
            color: #fff;
            background: linear-gradient(135deg, #7B1FA2 0%, #4527A0 100%);
            border: none;
            border-radius: 10px;
            cursor: pointer;
            margin-top: 8px;
        }
        .auth-btn:disabled { opacity: 0.6; cursor: not-allowed; }
        .auth-foot {
            margin-top: 18px;
            text-align: center;
            font-size: 13px;
            color: #666;
        }
        .auth-foot a {
            color: #7B1FA2;
            font-weight: 600;
            text-decoration: none;
        }
        .auth-msg {
            padding: 12px 14px;
            border-radius: 10px;
            font-size: 13px;
            margin-bottom: 16px;
            display: none;
        }
        .auth-msg.show { display: block; }
        .auth-msg.error { background: #FFEBEE; color: #C62828; }
        .auth-msg.info  { background: #E3F2FD; color: #1565C0; }
        .auth-notice {
            background: #FFF8E1;
            color: #6D4C00;
            font-size: 12px;
            padding: 10px 12px;
            border-radius: 8px;
            margin-bottom: 18px;
            line-height: 1.5;
        }
    </style>
</head>
<body>
    <div class="auth-wrap">
        <div class="auth-card">
            <div class="auth-logo">⚡ <span>QR코드 생성 시스템</span></div>
            <p class="auth-sub" id="authSub">대리점 가입 신청</p>

            <div class="auth-notice" id="authNotice">
                ℹ 가입 신청 후 <b>본사 승인</b>이 완료되어야 로그인할 수 있습니다.<br>
                ℹ 이미 가입된 이메일이면 같은 비밀번호를 입력하여 <b>대리점을 추가</b>할 수 있습니다.
            </div>

            <div id="msgBox" class="auth-msg"></div>

            <form id="signupForm" autocomplete="on">
                <div class="auth-field">
                    <label for="agencyName">대리점명</label>
                    <input type="text" id="agencyName" required maxlength="30" placeholder="예: 스피드_해운대">
                </div>
                <div class="auth-field">
                    <label for="displayName">관리자명</label>
                    <input type="text" id="displayName" required maxlength="20" placeholder="홍길동">
                </div>
                <div class="auth-field">
                    <label for="phone">연락처</label>
                    <input type="tel" id="phone" required maxlength="20" placeholder="010-1234-5678">
                </div>
                <div class="auth-field">
                    <label for="email">이메일</label>
                    <input type="email" id="email" required autocomplete="email" placeholder="admin@example.com">
                </div>
                <div class="auth-field">
                    <label for="password">비밀번호</label>
                    <input type="password" id="password" required autocomplete="new-password" minlength="6" placeholder="6자 이상">
                    <div class="hint">6자 이상으로 설정하세요</div>
                </div>
                <button type="submit" class="auth-btn" id="submitBtn">가입 신청</button>
            </form>

            <p class="auth-foot">
                이미 계정이 있으신가요? <a href="login.html">로그인</a>
            </p>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="auth.js"></script>
    <script>
        var addMode = false;          // 로그인 상태에서의 "대리점 추가" 모드
        var MAX_AGENCIES = 3;         // 계정당 최대 대리점 수

        // ── 진입 시: 로그인된 대리점 관리자면 "추가 신청" 모드로 전환 ──
        (async function initSignupMode() {
            var session = null;
            try { session = await window.Auth.getSession(); } catch (e) {}
            if (!session) return;     // 비로그인 → 기존 신규 가입 폼 그대로

            var profile = null;
            try { profile = await window.Auth.getProfile(); } catch (e) {}
            // 대리점 관리자만 추가 모드 (본사/미승인 등은 기본 폼 유지)
            if (!profile || profile.role !== 'agency_admin') return;

            addMode = true;

            var sub = document.getElementById('authSub');
            if (sub) sub.textContent = '대리점 추가 신청';
            document.title = '대리점 추가 신청 — Speed Apartment';

            // 로그인 계정에 이미 있는 정보(관리자명·이메일·비밀번호)는 재입력 불필요 → 숨김
            ['displayName', 'email', 'password'].forEach(function (id) {
                var input = document.getElementById(id);
                if (input) {
                    input.required = false;
                    var wrap = input.closest('.auth-field');
                    if (wrap) wrap.style.display = 'none';
                }
            });

            var notice = document.getElementById('authNotice');
            var btn = document.getElementById('submitBtn');
            var foot = document.querySelector('.auth-foot');
            var phoneInput = document.getElementById('phone');
            if (foot) foot.innerHTML = '<a href="landing.html">← 랜딩으로 돌아가기</a>';
            btn.textContent = '대리점 추가 신청';

            try {
                var mine = await window.Auth.listMyAgencies();
                var active = mine.filter(function (a) { return a.status !== 'rejected'; });
                // 기존 연락처를 기본값으로 채워줌
                if (phoneInput && !phoneInput.value && mine.length) {
                    phoneInput.value = mine[mine.length - 1].phone || '';
                }
                if (notice) {
                    notice.innerHTML =
                        'ℹ 로그인된 계정에 대리점을 추가합니다. <b>최대 ' + MAX_AGENCIES + '개</b>까지 등록 가능합니다.<br>' +
                        'ℹ 현재 등록: <b>' + active.length + ' / ' + MAX_AGENCIES + '개</b> · 추가 신청 후 <b>본사 승인</b>이 필요합니다.';
                }
                if (active.length >= MAX_AGENCIES) {
                    var box = document.getElementById('msgBox');
                    box.className = 'auth-msg error show';
                    box.textContent = '⚠ 이미 최대 ' + MAX_AGENCIES + '개의 대리점을 등록했습니다. 더 추가할 수 없습니다.';
                    document.getElementById('agencyName').disabled = true;
                    if (phoneInput) phoneInput.disabled = true;
                    btn.disabled = true;
                }
            } catch (e) { console.warn('보유 대리점 조회 실패:', e); }
        })();

        document.getElementById('signupForm').addEventListener('submit', async function (e) {
            e.preventDefault();
            const btn = document.getElementById('submitBtn');
            const box = document.getElementById('msgBox');
            box.className = 'auth-msg';

            // ───── 로그인 상태: 대리점 추가 신청 ─────
            if (addMode) {
                const addName  = document.getElementById('agencyName').value.trim();
                const addPhone = document.getElementById('phone').value.trim();
                if (!addName || !addPhone) {
                    box.className = 'auth-msg error show';
                    box.textContent = '⚠ 대리점명과 연락처를 입력하세요';
                    return;
                }
                btn.disabled = true;
                btn.textContent = '처리 중...';
                try {
                    await window.Auth.addAgency(addName, addPhone);
                    alert('대리점 추가 신청이 접수되었습니다. 본사 승인 후 활성화됩니다.');
                    location.href = 'landing.html';
                } catch (err) {
                    console.error(err);
                    box.className = 'auth-msg error show';
                    box.textContent = '⚠ ' + (err.message || '추가 신청 실패');
                    btn.disabled = false;
                    btn.textContent = '대리점 추가 신청';
                }
                return;
            }

            // ───── 비로그인: 신규 가입 흐름 ─────
            const payload = {
                agencyName:  document.getElementById('agencyName').value.trim(),
                displayName: document.getElementById('displayName').value.trim(),
                phone:       document.getElementById('phone').value.trim(),
                email:       document.getElementById('email').value.trim(),
                password:    document.getElementById('password').value
            };

            btn.disabled = true;
            btn.textContent = '처리 중...';
            box.className = 'auth-msg';

            try {
                const result = await window.Auth.signUp(payload);
                // 본사 알림 이메일 발송 (EmailJS, 옵션 — 실패해도 가입은 성공)
                try {
                    if (window.emailjs && window.HQ_NOTIFY_TEMPLATE) {
                        await window.emailjs.send(
                            window.HQ_NOTIFY_SERVICE || 'default_service',
                            window.HQ_NOTIFY_TEMPLATE,
                            {
                                agency_name:  payload.agencyName,
                                display_name: payload.displayName,
                                phone:        payload.phone,
                                email:        payload.email,
                                signup_mode:  result.mode === 'existing' ? '추가' : '신규',
                                signup_time:  new Date().toLocaleString('ko-KR')
                            }
                        );
                    }
                } catch (mailErr) {
                    console.warn('본사 알림 메일 실패(가입 자체는 성공):', mailErr);
                }
                // 가입 직후 자동 생성된 세션을 끊고 로그인 화면으로
                try { await window.Auth.signOut(); } catch (e) {}
                const successKey = result.mode === 'existing' ? 'agency_added' : 'signup_success';
                location.href = 'login.html?status=' + successKey;
            } catch (err) {
                console.error(err);
                box.className = 'auth-msg error show';
                let msg = err.message || '가입 실패';

                // 보안용 짧은 간격 제한 (Supabase rate limit)
                const rateMatch = msg.match(/after\s+(\d+)\s+seconds/i);
                if (rateMatch) {
                    const sec = parseInt(rateMatch[1], 10);
                    msg = `잠시 후 다시 시도하세요. (${sec}초 후 재시도 가능)`;
                    // 카운트다운 + 자동 활성화
                    let remaining = sec;
                    btn.textContent = `${remaining}초 대기...`;
                    const tick = setInterval(() => {
                        remaining--;
                        if (remaining <= 0) {
                            clearInterval(tick);
                            btn.disabled = false;
                            btn.textContent = '가입 신청';
                            box.className = 'auth-msg';
                        } else {
                            btn.textContent = `${remaining}초 대기...`;
                        }
                    }, 1000);
                    box.textContent = '⏱ ' + msg;
                    return;
                }

                if (msg.includes('User already registered') || msg.includes('already registered')) {
                    msg = '이미 가입된 이메일입니다';
                } else if (msg.includes('Password should be')) {
                    msg = '비밀번호는 6자 이상이어야 합니다';
                } else if (msg.includes('invalid email') || msg.includes('Invalid email')) {
                    msg = '올바른 이메일 형식이 아닙니다';
                } else if (msg.includes('rate limit')) {
                    msg = '잠시 후 다시 시도하세요.';
                }
                box.textContent = '⚠ ' + msg;
                btn.disabled = false;
                btn.textContent = '가입 신청';
            }
        });
    </script>
</body>
</html>
